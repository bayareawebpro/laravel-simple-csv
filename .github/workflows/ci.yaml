name: ci
env:
  XDEBUG_MODE: 'coverage'
on:
  push:
    branches:
      - master
      - dev
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [ 8.3, 8.4, 8.5 ]

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: pcov

      - name: Cache Composer Dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.OS }}-build-${{ hashFiles('**/composer.lock') }}

      - name: Composer Dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-suggest --no-scripts

      - name: Execute Lint
        run: composer lint

      - name: Execute Tests
        run: composer test

      - name: Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}